# release.yml
# Creates a GitHub Release with auto-generated changelog when a version tag is pushed.
# Usage: git tag 0.1.0 && git push origin 0.1.0
name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'   # e.g. 0.1.0, 1.0.0, 1.2.3-beta.1

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Find the previous tag (if any)
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | head -2 | tail -1)

          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            # First release — changelog from all commits
            echo "First release, generating full changelog"
            RANGE="HEAD"
          else
            echo "Generating changelog from $PREV_TAG to $TAG"
            RANGE="${PREV_TAG}..${TAG}"
          fi

          {
            echo 'CHANGELOG<<CHANGELOG_EOF'
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges \
              | grep -v "^- Merge " \
              | grep -v "Co-Authored-By:" \
              || echo "- Initial release"
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
